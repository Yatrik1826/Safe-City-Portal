version: '3.9'
services:
  mongo:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  server:
    build: ./server
    environment:
      - MONGO_URI=mongodb://mongo:27017/nirbhaya_safe_city
      - JWT_SECRET=change_this_secret
    ports:
      - "4000:4000"
    depends_on:
      - mongo
  client:
    build: ./client
    environment:
      - VITE_API_URL=http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
